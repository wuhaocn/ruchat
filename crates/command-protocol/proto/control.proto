syntax = "proto3";

package command_plane.control;

message PbCommandDescriptor {
  string name = 1;
  string description = 2;
  repeated string default_args = 3;
  bool allow_extra_args = 4;
}

message PbCommandCatalog {
  repeated PbCommandDescriptor commands = 1;
}

message PbClientHello {
  string node_id = 1;
  string hostname = 2;
  string platform = 3;
  uint64 poll_interval_secs = 4;
}

message PbSessionInfo {
  string session_id = 1;
  string node_id = 2;
  uint64 heartbeat_interval_secs = 3;
  uint64 max_result_output_bytes = 4;
  string protocol_version = 5;
  uint64 server_unix_secs = 6;
}

message PbTaskAssignment {
  uint64 task_id = 1;
  string command_name = 2;
  repeated string args = 3;
  uint64 created_at_unix_secs = 4;
  optional uint64 timeout_secs = 5;
  uint32 attempt = 6;
}

message PbTaskPullRequest {
  // Must match the authenticated node bound to the current WS session.
  string node_id = 1;
  // Current implementation is single in-flight task per node, so values >1 are
  // capped to MAX_TASK_PULL_RESPONSE_ITEMS (=1); 0 means "return no task".
  uint32 limit = 2;
}

message PbTaskPullResponse {
  repeated PbTaskAssignment tasks = 1;
}

message PbTaskAck {
  uint64 task_id = 1;
}

message PbTaskCancel {
  uint64 task_id = 1;
  optional string reason = 2;
}

message PbTaskResult {
  uint64 task_id = 1;
  bool success = 2;
  optional int32 exit_code = 3;
  string stdout = 4;
  string stderr = 5;
  uint64 duration_ms = 6;
  optional string error = 7;
  bool stdout_truncated = 8;
  bool stderr_truncated = 9;
}

message PbNodeError {
  string message = 1;
}

message PbNodePayloadEnvelope {
  oneof body {
    PbClientHello client_hello = 1;
    PbTaskAssignment task_assignment = 2;
    PbTaskResult task_result = 3;
    PbTaskAck task_ack = 4;
    PbTaskCancel task_cancel = 5;
    PbNodeError error = 6;
    PbSessionInfo session_info = 7;
    PbCommandCatalog command_catalog = 8;
    PbTaskPullRequest task_pull_request = 9;
    PbTaskPullResponse task_pull_response = 10;
  }
}
